spring:
  application:
    name: ride-hailing-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/ride_hailing
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:ride_hailing_user}
    password: ${DB_PASSWORD:your_secure_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

server:
  port: 8080

logging:
  level:
    com.platform: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
