spring:
  application:
    name: ride-hailing-platform
  datasource:
    # Persist data across backend restarts (fixes "can't login" after restart)
    url: jdbc:h2:file:./data/ride_hailing;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

server:
  port: 8080

logging:
  level:
    com.platform: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
